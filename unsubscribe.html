<script>
(function() {
  const status = new URLSearchParams(window.location.search).get('status') || 'ok';
  const messages = {
    ok:           { title: "You're unsubscribed", body: "We won't email you again. If you ever change your mind, sign up on the homepage anytime." },
    invalid:      { title: "Invalid link",        body: "This unsubscribe link is invalid or has expired. Email contact@storybookadventures.io and we'll handle it." },
    rate_limited: { title: "Too many attempts",   body: "Please wait a moment and try again." },
    error:        { title: "Something went wrong", body: "We couldn't process your request. Please try again later or contact us at contact@storybookadventures.io." },
  };
  const m = messages[status] || messages.error;
  document.getElementById('status-title').textContent = m.title;
  document.getElementById('status-body').textContent = m.body;
})();
</script>
