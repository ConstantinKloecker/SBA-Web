<script>
(function() {
  const status = new URLSearchParams(window.location.search).get('status') || 'ok';
  const messages = {
    ok:           { title: "Du bist dabei!",          body: "Deine E-Mail wurde bestätigt. Wir halten dich auf dem Laufenden zu neuen Geschichtenwelten, Features und Updates." },
    already:      { title: "Bereits bestätigt",       body: "Deine E-Mail ist schon bestätigt — du bist startklar!" },
    invalid:      { title: "Ungültiger Link",         body: "Dieser Bestätigungslink ist ungültig oder abgelaufen. Bitte melde dich erneut an." },
    rate_limited: { title: "Zu viele Versuche",       body: "Bitte warte einen Moment und versuche es erneut." },
    error:        { title: "Etwas ist schiefgelaufen", body: "Wir konnten deine E-Mail nicht bestätigen. Bitte versuche es später erneut oder kontaktiere uns unter contact@storybookadventures.io." },
  };
  const m = messages[status] || messages.error;
  document.getElementById('status-title').textContent = m.title;
  document.getElementById('status-body').textContent = m.body;
})();
</script>
